{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="task-form">

        <h2>Change Password</h2>


        <form method="POST">
             {{ form.hidden_tag() }}

            <label>Current Password</label>

            <input 
            type="password"
            name="current_password"
            required>


            <label>New Password</label>

            <input 
            type="password"
            name="new_password"
            required>


            <label>Confirm New Password</label>

            <input 
            type="password"
            name="confirm_password"
            required>


            <div class="form-buttons">

                <button type="submit">
                    Save Password
                </button>


                <a href="/profile" class="cancel-btn">
                    Cancel
                </a>

            </div>


        </form>


    </div>

</div>


{% endblock %}
