{% extends "base.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<div class="task-form">

    <h2>Edit Profile</h2>

    <form method="POST">

        <label>Name</label>

        <input
            type="text"
            name="name"
            value="{{ user.name }}"
            required
        >

        <label>Email</label>

        <input
            type="email"
            name="email"
            value="{{ user.email }}"
            required
        >

        <div class="form-buttons">

            <button type="submit">
                Save Changes
            </button>

            <a
                href="/profile"
                class="cancel-btn">
                Cancel
            </a>

        </div>

    </form>

</div>

{% endblock %}
