{% extends "base.html" %}

{% block title %}
Edit Task
{% endblock %}

{% block content %}

<div class="task-form">

    <h2>Edit Task</h2>

    <form method="POST">

        <label>Task Title</label>

        <input
            type="text"
            name="title"
            value="{{ task.title }}"
            required
        >

        <label>Description</label>

        <textarea
            name="description"
            rows="5"
        >{{ task.description }}</textarea>

        <label>Due Date</label>

        <input
            type="date"
            name="due_date"
            value="{{ task.due_date.strftime('%Y-%m-%d') if task.due_date else '' }}"
        >

        <label>Priority</label>

        <select name="priority">

            <option value="High"
                {% if task.priority == "High" %}selected{% endif %}>
                🔴 High
            </option>

            <option value="Medium"
                {% if task.priority == "Medium" %}selected{% endif %}>
                🟡 Medium
            </option>

            <option value="Low"
                {% if task.priority == "Low" %}selected{% endif %}>
                🟢 Low
            </option>

        </select>

        <button type="submit">
            Save Changes
        </button>

    </form>

</div>

{% endblock %}
