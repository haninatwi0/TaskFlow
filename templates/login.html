{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}
<h1>Login</h1>

<form method="POST">

    <label>Email</label>
    <input 
        type="email"
        name="email"
        placeholder="Email"
        required
    >

    <label>Password</label>
    <input 
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <button type="submit">
        Login
    </button>

</form>
{% endblock %}
